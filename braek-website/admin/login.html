<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Braek Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --border: rgba(255, 255, 255, 0.08);
            --text: #fff;
            --text-secondary: #666;
            --accent: #e63946;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .login-logo {
            display: block;
            height: 32px;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color .2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity .2s;
        }

        .btn:hover {
            opacity: .85;
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .error-msg {
            background: rgba(230, 57, 70, .1);
            border: 1px solid rgba(230, 57, 70, .3);
            color: #e63946;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: none;
        }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/logos/Principal.svg">
</head>

<body>
    <div class="login-card">
        <img src="../assets/logos/Logo.svg" alt="Braek" class="login-logo">
        <h1>Painel Administrativo</h1>
        <p>Entre com suas credenciais para continuar.</p>

        <div class="error-msg" id="error-msg"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="admin@braek.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn" id="submit-btn">Entrar</button>
        </form>
    </div>

    <script>
        // Redirect if already logged in
        fetch('../api/auth/check.php')
            .then(r => r.json())
            .then(data => { if (data.authenticated) window.location.href = 'index.html'; })
            .catch(() => { });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const err = document.getElementById('error-msg');
            err.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Entrando...';

            try {
                const res = await fetch('../api/auth/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (data.success) {
                    // Store token for use in admin.js requests
                    if (data.token) localStorage.setItem('braek_admin_token', data.token);
                    window.location.href = 'index.html';
                } else {
                    err.textContent = data.error || 'Credenciais inválidas.';
                    err.style.display = 'block';
                }
            } catch (ex) {
                err.textContent = 'Erro de conexão. Tente novamente.';
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });
    </script>
</body>

</html>
